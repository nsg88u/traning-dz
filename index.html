<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Мой сайт на Nginx</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            text-align: center;
        }
        .container {
            background: rgba(255,255,255,0.1);
            padding: 2rem;
            border-radius: 10px;
            box-shadow: 0 8px 32px 0 rgba(31,38,135,0.37);
            backdrop-filter: blur(4px);
            border: 1px solid rgba(255,255,255,0.18);
        }
        h1 {
            font-size: 3rem;
            margin-bottom: 1rem;
        }
        p {
            font-size: 1.2rem;
            opacity: 0.9;
        }
        .docker-logo {
            width: 100px;
            height: 100px;
            margin-bottom: 1rem;
        }
    </style>
</head>
<body>
    <div class="container">
        <svg class="docker-logo" viewBox="0 0 24 24" fill="currentColor">
            <path d="M13.983 11.078h-2.119a.186.186 0 0 0-.186.185v2.15c0 .102.084.186.186.186h2.119a.186.186 0 0 0 .186-.186v-2.15a.186.186 0 0 0-.186-.185z"/>
            <!-- Упрощённый логотип Docker -->
            <path d="M23.9 9.4c-.6-.4-1.6-.5-2.6-.3-.2-1.2-1-2.3-2-3.1l-.5-.4-.4.5c-.5.7-.8 1.6-.8 2.5 0 .5.1 1 .3 1.5-.4.2-1 .3-1.6.3H.3c-.2 0-.3.1-.3.3 0 2.8.8 5.2 2.5 7 .8.9 2.2 1.6 4.1 1.6h10.8c3.9 0 7.1-2.5 8.2-6 .1-.2.1-.4.1-.7 0-.5-.1-.9-.3-1.3.3-.4.5-.9.5-1.5 0-.5-.2-1-.5-1.4z"/>
        </svg>
        <h1>🚀 Docker + Nginx</h1>
        <p>Этот сайт работает в контейнере Docker на базе Nginx</p>
        <p>Файл index.html успешно скопирован в /usr/share/nginx/html</p>
        <p>Конфигурация Nginx настроена через /etc/nginx/conf.d/default.conf</p>
        <p><small>Собрано с ❤️ с помощью Docker</small></p>
    </div>
</body>
</html>
