---
- name: Deploy Nginx Docker container with mounted files
  hosts: localhost
  connection: local
  become: true

  vars:
    container_name: nginx-ansible
    nginx_image: nginx:alpine
    host_port: 8081
    container_port: 80
    nginx_config_path: /etc/nginx/conf.d/default.conf
    html_file_path: /usr/share/nginx/html/index.html

  tasks:
    - name: Ensure Docker is installed
      package:
        name: docker.io
        state: present

    - name: Start Docker service
      systemd:
        name: docker
        state: started
        enabled: yes

    - name: Create nginx configuration file from template
      template:
        src: templates/nginx.conf.j2
        dest: "{{ playbook_dir }}/files/nginx_container.conf"

    - name: Pull Nginx image
      docker_image:
        name: "{{ nginx_image }}"
        source: pull

    - name: Run Nginx container with port mapping and volume mounts
      docker_container:
        name: "{{ container_name }}"
        image: "{{ nginx_image }}"
        state: started
        recreate: yes
        ports:
          - "{{ host_port }}:{{ container_port }}"
        volumes:
          - "{{ playbook_dir }}/files/index.html:{{ html_file_path }}:ro"
          - "{{ playbook_dir }}/files/nginx_container.conf:{{ nginx_config_path }}:ro"
        restart_policy: always

    - name: Wait for Nginx to be ready
      wait_for:
        host: localhost
        port: "{{ host_port }}"
        timeout: 30

    - name: Test Nginx container is responding
      uri:
        url: http://localhost:{{ host_port }}/
        method: GET
      register: nginx_test
      until: nginx_test.status == 200
      retries: 5
      delay: 2

    - name: Display success message
      debug:
        msg: "Nginx container '{{ container_name }}' is running and accessible at http://localhost:{{ host_port }}/"