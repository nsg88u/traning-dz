version: '3.8'

services:
  nginx:
    image: nginx:alpine
    deploy:
      mode: global  # Поднимает по одному контейнеру на каждую ноду
      placement:
        constraints:
          - node.role == worker  # Ограничение: только на worker-нодах (опционально)
    configs:
      - source: nginx_config
        target: /etc/nginx/nginx.conf
    networks:
      - overlay_network
    ports:
      - "80:80"

  postgres:
    image: postgres:15-alpine
    deploy:
      replicas: 1
      placement:
        constraints:
          - node.labels.db_node == true  # Поднимается только на ноде с лейблом db_node=true
    environment:
      POSTGRES_DB: mydb
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - overlay_network

volumes:
  postgres_data:
    driver: local

configs:
  nginx_config:
    file: ./nginx.conf  # Путь к файлу конфигурации nginx

networks:
  overlay_network:
    driver: overlay
    attachable: true  # Позволяет подключаться другим сервисам
